<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Monitor — 热点发现</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 点阵背景 -->
  <div class="dot-grid"></div>

  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="url(#logoGrad)" stroke-width="2.5"/>
          <circle cx="14" cy="14" r="5" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">Hot Monitor</span>
    </div>
    <div class="top-bar-right">
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span id="systemStatus">监控中</span>
      </div>
      <button class="notif-btn" id="notifBtn" title="通知">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="notifBadge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container">
    <div class="bento-grid">

      <!-- 关键词监控 -->
      <section class="bento-card card-keywords" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
              </div>
              <h2>关键词监控</h2>
            </div>
            <span class="card-badge badge-primary">实时</span>
          </div>
          <div class="keyword-input-wrap">
            <input type="text" id="keywordInput" placeholder="输入要监控的关键词..." maxlength="200">
            <button id="addKeywordBtn" class="btn-primary">添加</button>
          </div>
          <div id="keywordList" class="keyword-list"></div>
        </div>
      </section>

      <!-- 热点范围 -->
      <section class="bento-card card-scope" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-violet">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
              </div>
              <h2>热点范围</h2>
            </div>
            <span class="card-badge badge-violet">发现</span>
          </div>
          <div class="keyword-input-wrap">
            <input type="text" id="scopeInput" placeholder="输入热点范围 (如 AI编程)..." maxlength="200">
            <button id="addScopeBtn" class="btn-violet">追踪</button>
          </div>
          <div id="scopeList" class="keyword-list"></div>
        </div>
      </section>

      <!-- 数据源状态 -->
      <section class="bento-card card-sources" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-emerald">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </div>
              <h2>数据源</h2>
            </div>
          </div>
          <div class="sources-grid">
            <div class="source-item">
              <svg class="source-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              <span class="source-name">Web Search</span>
              <span class="source-status active">在线</span>
            </div>
            <div class="source-item">
              <svg class="source-svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              <span class="source-name">Twitter/X</span>
              <span class="source-status" id="twitterStatus">待配置</span>
            </div>
            <div class="source-item">
              <svg class="source-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
              <span class="source-name">RSS Feeds</span>
              <span class="source-status active">在线</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 实时热点 -->
      <section class="bento-card card-hotspots" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-rose">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <h2>实时热点</h2>
            </div>
            <button id="refreshHotspotsBtn" class="btn-ghost">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              <span>刷新</span>
            </button>
          </div>
          <div id="hotspotsList" class="hotspots-list">
            <div class="empty-state">
              <div class="empty-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <p>等待扫描中...</p>
              <span class="empty-hint">添加热点范围后将自动发现热点</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 监控通知 -->
      <section class="bento-card card-notifications" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-amber">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
              </div>
              <h2>监控通知</h2>
            </div>
            <button id="readAllBtn" class="btn-ghost">全部已读</button>
          </div>
          <div id="notificationsList" class="notifications-list">
            <div class="empty-state">
              <p>暂无通知，正在监控中...</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- 通知弹出面板 -->
  <div class="notif-panel" id="notifPanel" style="display:none">
    <div class="notif-panel-header">
      <h3>通知中心</h3>
      <button class="btn-ghost" id="closeNotifPanel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="notifPanelList" class="notif-panel-list"></div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
