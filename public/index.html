<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Monitor — 热点发现</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 点阵背景 -->
  <div class="dot-grid"></div>

  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="url(#logoGrad)" stroke-width="2.5"/>
          <circle cx="14" cy="14" r="5" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">Hot Monitor</span>
    </div>
    <div class="top-bar-right">
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span id="systemStatus">监控中</span>
      </div>
      <button class="notif-btn" id="notifBtn" title="通知">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="notifBadge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container">
    <div class="bento-grid">

      <!-- 关键词监控 -->
      <section class="bento-card card-keywords" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
              </div>
              <h2>关键词监控</h2>
            </div>
            <span class="card-badge badge-primary">每30分钟</span>
          </div>
          <div class="keyword-input-wrap">
            <input type="text" id="keywordInput" placeholder="输入要监控的关键词..." maxlength="200">
            <button id="addKeywordBtn" class="btn-primary">添加</button>
          </div>
          <div id="keywordList" class="keyword-list"></div>
        </div>
      </section>

      <!-- 热点流 -->
      <section class="bento-card card-notifications" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-rose">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <h2>实时热点流</h2>
            </div>
            <button id="readAllBtn" class="btn-ghost">全部已读</button>
          </div>
          <div id="notificationsList" class="notifications-list">
            <div class="empty-state">
              <div class="empty-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <p>等待扫描中...</p>
              <span class="empty-hint">添加关键词后每30分钟自动抓取热点</span>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- 通知弹出面板 -->
  <div class="notif-panel" id="notifPanel" style="display:none">
    <div class="notif-panel-header">
      <h3>通知中心</h3>
      <button class="btn-ghost" id="closeNotifPanel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="notifPanelList" class="notif-panel-list"></div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
