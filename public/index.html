<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Monitor — 热点发现</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 点阵背景 -->
  <div class="dot-grid"></div>

  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="url(#logoGrad)" stroke-width="2.5"/>
          <circle cx="14" cy="14" r="5" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">Hot Monitor</span>
    </div>
    <div class="top-bar-right">
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span id="systemStatus">监控中</span>
      </div>
      <button class="notif-btn" id="notifBtn" title="通知">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="notifBadge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container">
    <!-- 热点雷达 -->
    <div class="radar-bar">
      <div class="radar-item">
        <span class="radar-value" id="radarTotal">0</span>
        <span class="radar-label">总热点</span>
      </div>
      <div class="radar-divider"></div>
      <div class="radar-item">
        <span class="radar-value radar-highlight" id="radarToday">0</span>
        <span class="radar-label">今日新增</span>
      </div>
      <div class="radar-divider"></div>
      <div class="radar-item">
        <span class="radar-value" id="radarKeywords">0</span>
        <span class="radar-label">监控词</span>
      </div>
      <div class="radar-divider"></div>
      <div class="radar-item">
        <span class="radar-value radar-unread" id="radarUnread">0</span>
        <span class="radar-label">未读</span>
      </div>
    </div>

    <div class="bento-grid">

      <!-- 关键词监控 -->
      <section class="bento-card card-keywords" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
              </div>
              <h2>关键词监控</h2>
            </div>
            <span class="card-badge badge-primary">每30分钟</span>
          </div>
          <div class="keyword-input-wrap">
            <input type="text" id="keywordInput" placeholder="输入要监控的关键词..." maxlength="200">
            <button id="addKeywordBtn" class="btn-primary">添加</button>
          </div>
          <div id="keywordList" class="keyword-list"></div>
          <button id="runNowBtn" class="btn-run-now" title="立即监控所有激活的关键词">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            立即监控
          </button>
        </div>
      </section>

      <!-- 热点流 -->
      <section class="bento-card card-notifications" data-spotlight>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon-wrap icon-rose">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <h2>实时热点流</h2>
            </div>
            <button id="readAllBtn" class="btn-ghost">全部已读</button>
          </div>
          <div class="filter-bar">
            <select id="sortSelect" class="filter-select">
              <option value="time-desc">最新优先</option>
              <option value="time-asc">最早优先</option>
              <option value="credibility">可信度优先</option>
              <option value="keyword-group">按关键词分组</option>
            </select>
            <button id="keywordFilterBtn" class="filter-select filter-btn" type="button">
              全部关键词 ▾
            </button>
            <select id="readFilter" class="filter-select">
              <option value="">全部状态</option>
              <option value="unread">未读</option>
              <option value="read">已读</option>
            </select>
            <select id="credFilter" class="filter-select">
              <option value="">全部可信度</option>
              <option value="high">高 (≥70)</option>
              <option value="mid">中 (40-69)</option>
              <option value="low">低 (&lt;40)</option>
            </select>
            <select id="timeFilter" class="filter-select">
              <option value="">全部时间</option>
              <option value="1h">1小时内</option>
              <option value="24h">24小时内</option>
              <option value="3d">3天内</option>
            </select>
            <button id="resetFiltersBtn" class="filter-reset-btn" title="重置所有筛选">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
            </button>
          </div>
          <div class="notif-toolbar">
            <button id="toggleAllReasons" class="btn-ghost btn-toggle-reasons" title="展开/折叠所有AI分析理由">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 15l-6-6-6 6"/>
              </svg>
              折叠全部理由
            </button>
          </div>
          <div id="notificationsList" class="notifications-list">
            <div class="empty-state">
              <div class="empty-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <p>等待扫描中...</p>
              <span class="empty-hint">添加关键词后每30分钟自动抓取热点</span>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- 通知弹出面板 -->
  <div class="notif-panel" id="notifPanel" style="display:none">
    <div class="notif-panel-header">
      <h3>通知中心</h3>
      <button class="btn-ghost" id="closeNotifPanel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="notifPanelList" class="notif-panel-list"></div>
  </div>

  <!-- 关键词筛选 Modal -->
  <div id="kwFilterModal" class="modal-overlay" style="display:none">
    <div class="modal-content kw-filter-modal">
      <div class="modal-header">
        <h3>筛选关键词</h3>
        <button id="kwFilterClose" class="modal-close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="kw-filter-search-wrap">
        <input type="text" id="kwFilterSearch" class="kw-filter-search" placeholder="搜索关键词...">
      </div>
      <div id="kwFilterList" class="kw-filter-list"></div>
      <div class="kw-filter-actions">
        <button id="kwFilterSelectAll" class="btn-ghost">全选</button>
        <button id="kwFilterClearAll" class="btn-ghost">清除</button>
        <button id="kwFilterDone" class="btn-primary btn-sm">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
